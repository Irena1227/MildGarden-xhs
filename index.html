<!DOCTYPE html>
<html lang="zh-CN" style="background:#13110f!important">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>MildGarden · 封面生成器 v3.2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Serif+SC:wght@200;300;400;500;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap');

  :root {
    --mist: #f5f0eb;
    --petal: #e8c4b8;
    --ink: #2a2420;
    --ink-soft: #5c524a;
    --ink-faint: #9e938a;
    --blue-memory: #b8c9d9;
    --sigma-red: #c45c4f;
    --sigma-glow: #e8847a;
    --sage: #c2cdb8;
    --bg: #13110f;
  }

  /* Force dark background everywhere */
  html, body { background:#13110f!important; background-color:#13110f!important; }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', 'Noto Serif SC', serif;
    color: var(--mist);
    min-height: 100vh;
    padding: 20px;
  }

  .app-header { text-align:center; padding:24px 20px 16px; }
  .app-header h1 { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:26px; letter-spacing:5px; color:#f5f0eb; }
  .app-header .sub { font-size:11px; color:#9e938a; letter-spacing:3px; margin-top:4px; }

  .workspace { display:flex; gap:28px; max-width:1160px; margin:20px auto; align-items:flex-start; }
  @media(max-width:860px) {
    .workspace { flex-direction:column; align-items:center; }
    .controls { max-width:100%!important; min-width:0!important; width:100%!important; }
  }

  .controls { flex:1; max-width:440px; min-width:320px; }
  .control-section { margin-bottom:20px; }
  .control-label { font-family:'Noto Serif SC',serif; font-weight:300; font-size:12px; color:#e8c4b8; letter-spacing:2px; margin-bottom:8px; }

  .template-grid { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:6px; }

  .tbtn {
    background:rgba(250,247,242,0.03); border:1px solid rgba(250,247,242,0.07);
    border-radius:6px; padding:8px 4px; cursor:pointer; transition:all 0.25s; text-align:center;
  }
  .tbtn:hover { background:rgba(250,247,242,0.07); }
  .tbtn.active { background:rgba(232,196,184,0.1); border-color:#e8c4b8; }
  .tbtn .icon { font-size:15px; margin-bottom:2px; }
  .tbtn .tname { font-family:'Noto Serif SC',serif; font-weight:400; font-size:9px; color:#f5f0eb; }

  .input-group { margin-bottom:12px; }
  .input-group label {
    display:block; font-family:'DM Sans',sans-serif; font-size:10px;
    color:#9e938a; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:5px;
  }
  .input-group textarea, .input-group input[type="text"] {
    width:100%; background:rgba(250,247,242,0.04); border:1px solid rgba(250,247,242,0.1);
    border-radius:4px; padding:9px 11px; color:#f5f0eb;
    font-family:'Noto Serif SC',serif; font-weight:300; font-size:13px; line-height:1.6;
    resize:vertical; outline:none; transition:border-color 0.3s;
  }
  .input-group textarea:focus, .input-group input[type="text"]:focus { border-color:#e8c4b8; }
  .input-group textarea { min-height:68px; }
  .input-group input[type="text"] { height:36px; }
  .input-hint { font-size:9px; color:#9e938a; margin-top:3px; opacity:0.6; }

  .slider-row { display:flex; align-items:center; gap:10px; }
  .slider-row input[type="range"] {
    flex:1; -webkit-appearance:none; height:3px;
    background:rgba(250,247,242,0.15); border-radius:2px; outline:none;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance:none; width:14px; height:14px; border-radius:50%;
    background:#e8c4b8; cursor:pointer; border:2px solid #13110f;
  }
  .slider-val { font-size:11px; color:#9e938a; min-width:32px; text-align:right; }

  .upload-area {
    border:1px dashed rgba(250,247,242,0.15); border-radius:6px; padding:16px;
    text-align:center; cursor:pointer; transition:all 0.3s; position:relative;
  }
  .upload-area:hover { border-color:#e8c4b8; background:rgba(250,247,242,0.02); }
  .upload-area .upload-text { font-size:11px; color:#9e938a; letter-spacing:1px; }
  .upload-area input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; }
  .upload-preview { margin-top:8px; max-width:100%; max-height:80px; border-radius:4px; display:none; }

  .export-btn {
    width:100%; padding:13px; background:#c45c4f; border:none; border-radius:6px;
    color:white; font-family:'Noto Serif SC',serif; font-weight:400; font-size:13px;
    letter-spacing:3px; cursor:pointer; transition:all 0.3s; margin-top:8px;
  }
  .export-btn:hover { background:#e8847a; }
  .export-info { text-align:center; font-size:9px; color:#9e938a; margin-top:6px; letter-spacing:1px; }

  .preview-area { flex-shrink:0; display:flex; flex-direction:column; align-items:center; }
  .preview-label { font-size:10px; color:#9e938a; letter-spacing:3px; text-transform:uppercase; margin-bottom:10px; }
  .preview-frame { box-shadow:0 20px 60px rgba(0,0,0,0.5); border-radius:4px; overflow:hidden; }

  .cover-canvas { width:360px; height:480px; position:relative; overflow:hidden; font-family:'Noto Serif SC',serif; }

  .export-wrap { position:fixed; left:-9999px; top:-9999px; pointer-events:none; }
  .export-wrap .cover-canvas { width:1080px; height:1440px; }

  .deco { position:absolute; pointer-events:none; z-index:2; }

  /* Templates */
  .t-rose { background:linear-gradient(170deg,#1a1418,#231c20 40%,#1a1316); }
  .t-rose::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 30% 60%,rgba(196,92,79,0.1),transparent 60%); }

  .t-daily { background:linear-gradient(165deg,#faf7f2,#f0e8df 40%,#e8ddd2); }
  .t-daily::before { content:''; position:absolute; top:-50%; right:-30%; width:200%; height:200%; background:radial-gradient(ellipse at 70% 20%,rgba(232,196,184,0.15),transparent 60%); }

  .t-exist { background:linear-gradient(175deg,#1e1b18,#252220 30%,#1a1714); }
  .t-exist::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 20% 30%,rgba(196,92,79,0.07),transparent 50%),radial-gradient(ellipse at 80% 70%,rgba(184,201,217,0.05),transparent 50%); }

  .t-memory { background:linear-gradient(170deg,#2a2832,#1e1b24 40%,#171520); }
  .t-memory::before { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:50%; height:50%; border-radius:50%; background:radial-gradient(circle,rgba(196,92,79,0.12),rgba(196,92,79,0.04) 40%,transparent 70%); filter:blur(20px); }

  .t-prompt { background:linear-gradient(160deg,#f7f3ee,#ede5db 50%,#e3d9cd); }
  .t-prompt::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,#c45c4f,#e8c4b8,#b8c9d9,#c2cdb8); opacity:0.7; }

  .t-game { background:linear-gradient(165deg,#1c1926,#211e2a 40%,#181520); }
  .t-game::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 50%,rgba(184,130,217,0.06),transparent 60%); }

  .t-beyond { background:linear-gradient(170deg,#2a2832,#1e1b24 40%,#171520); }

  .t-article { background:linear-gradient(170deg,#faf7f2,#f3ece3 50%,#ede4d9); }

  .cv-grid-bg {
    position:absolute; inset:0;
    background-image:linear-gradient(rgba(42,36,32,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(42,36,32,0.03) 1px,transparent 1px);
    background-size:30px 30px;
  }
  .tag-pill {
    display:inline-block; font-family:'DM Sans',sans-serif; letter-spacing:2px; text-transform:uppercase;
    padding:3px 9px; border-radius:2px; border:1px solid rgba(42,36,32,0.12); color:#5c524a; background:rgba(255,255,255,0.5);
  }

  /* Beyond preview image */
  .cv-bg-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }

  /* Save modal */
  .save-modal {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:9999;
    flex-direction:column; align-items:center; justify-content:center; padding:20px;
  }
  .save-modal.show { display:flex; }
  .save-modal img { max-width:80%; max-height:55vh; border-radius:6px; box-shadow:0 10px 40px rgba(0,0,0,0.5); }
  .save-modal .hint { margin-top:16px; font-size:13px; color:#e8c4b8; letter-spacing:1px; text-align:center; line-height:1.8; }
  .save-modal .modal-btns { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; justify-content:center; }
  .save-modal .mbtn {
    padding:10px 24px; border-radius:6px; font-size:12px; letter-spacing:2px; cursor:pointer; border:none;
  }
  .save-modal .mbtn-dl { background:#c45c4f; color:white; }
  .save-modal .mbtn-close { background:rgba(250,247,242,0.1); border:1px solid rgba(250,247,242,0.2); color:#f5f0eb; }
</style>
</head>

function buildFields(){
  const c=TC[cur],box=document.getElementById('inputFields');box.innerHTML='';
  c.fields.forEach(f=>{
    const g=document.createElement('div');g.className='input-group';
    const l=document.createElement('label');l.textContent=f.label;g.appendChild(l);
    if(f.type==='file'){
      const ua=document.createElement('div');ua.className='upload-area';
      ua.innerHTML=`<div class="upload-text">点击上传图片</div><input type="file" accept="image/*" onchange="handleUpload(event)"><img class="upload-preview" id="uploadPreview">`;

function handleUpload(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    uploadedImage=ev.target.result;
    // Pre-load as Image element for Canvas drawing
    const img=new Image();
    img.onload=()=>{uploadedImageEl=img;render();};
    img.src=uploadedImage;
    const p=document.getElementById('uploadPreview');
    if(p){p.src=uploadedImage;p.style.display='block';}
  };
  reader.readAsDataURL(file);
}

function onSlider(){fontScale=document.getElementById('fontSlider').value/100;document.getElementById('sliderVal').textContent=Math.round(fontScale*100)+'%';render();}

function fxs(b,e){return Math.round(b*(e?3:1));}
function fsc(b,e){return Math.round(b*(e?3:1)*fontScale);}

function adaptive(text,base,min,maxCh,isExp){
  const s=isExp?3:1,lines=(text||'').split('\n'),ml=Math.max(...lines.map(l=>l.length),1),lc=lines.length;
  let sz=base*s*fontScale;if(ml>maxCh)sz*=(maxCh/ml);if(lc>3)sz*=(3/lc)*1.15;
  return Math.max(min*s,Math.round(sz));
}

/* ===== BEYOND: Native Canvas Export ===== */
function exportBeyondNative(){
  return new Promise((resolve)=>{
    const W=1080,H=1440;
    const c=document.getElementById('nativeCanvas');
    c.width=W;c.height=H;
    const ctx=c.getContext('2d');

    // Background
    const bg=ctx.createLinearGradient(0,0,W*0.3,H);
    bg.addColorStop(0,'#2a2832');bg.addColorStop(0.4,'#1e1b24');bg.addColorStop(1,'#171520');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    function drawOverlayAndText(){
      // Gradient overlay
      const ov=ctx.createLinearGradient(0,H*0.4,0,H);
      ov.addColorStop(0,'rgba(23,21,32,0)');ov.addColorStop(1,'rgba(23,21,32,0.85)');
      ctx.fillStyle=ov;ctx.fillRect(0,0,W,H);

      // Brand top
      ctx.fillStyle='rgba(255,255,255,0.5)';
      ctx.font='300 27px "Cormorant Garamond", serif';
      ctx.textAlign='center';
      ctx.letterSpacing='4px';
      ctx.fillText((D.brand||'MildGarden').toUpperCase(),W/2,H*0.06);

      // Title bottom
      const tsz=Math.round(48*fontScale);
      ctx.fillStyle='#f5f0eb';
      ctx.font=`300 ${tsz}px "Noto Serif SC", serif`;
      ctx.textAlign='left';
      ctx.letterSpacing='3px';
      ctx.fillText(D.title||'',W*0.08,H*0.9);

      // From
      ctx.fillStyle='rgba(232,196,184,0.6)';
      ctx.font='300 30px "Cormorant Garamond", serif';
      ctx.letterSpacing='3px';
      ctx.fillText(D.from||'',W*0.08,H*0.94);

      c.toBlob(blob=>{resolve(blob);},'image/png',1.0);
    }

    if(uploadedImageEl){
      // Draw image with cover behavior
      const img=uploadedImageEl;
      const ir=img.width/img.height, cr=W/H;
      let sx=0,sy=0,sw=img.width,sh=img.height;
      if(ir>cr){sw=img.height*cr;sx=(img.width-sw)/2;}
      else{sh=img.width/cr;sy=(img.height-sh)/2;}
      ctx.drawImage(img,sx,sy,sw,sh,0,0,W,H);
      drawOverlayAndText();
    } else {
      drawOverlayAndText();
    }
  });
}

function closeModal(){document.getElementById('saveModal').classList.remove('show');if(lastBlobUrl){URL.revokeObjectURL(lastBlobUrl);lastBlobUrl=null;}}

function modalDownload(){
  if(!lastBlobUrl) return;
  const a=document.createElement('a');a.href=lastBlobUrl;a.download=`MildGarden_${cur}_${Date.now()}.png`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

function deliverBlob(blob){
  if(lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
  lastBlobUrl=URL.createObjectURL(blob);

  if(isMobile){
    const modal=document.getElementById('saveModal');
    document.getElementById('saveImg').src=lastBlobUrl;
    modal.classList.add('show');
  } else {
    const a=document.createElement('a');a.href=lastBlobUrl;a.download=`MildGarden_${cur}_${Date.now()}.png`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  }
}

async function doExport(){
  const btn=document.querySelector('.export-btn');
  btn.textContent='正 在 导 出 ...';btn.disabled=true;

  try {
    if(cur==='beyond'){
      // Use native Canvas API for beyond template
      const blob=await exportBeyondNative();
      deliverBlob(blob);
      btn.textContent='✓ 导 出 成 功';
    } else {
      const ec=document.getElementById('exportCanvas');
      renderTo(ec,true);
      await new Promise(r=>setTimeout(r,600));
      const canvas=await html2canvas(ec,{width:1080,height:1440,scale:1,useCORS:true,backgroundColor:null,logging:false});
      const blob=await new Promise(r=>canvas.toBlob(r,'image/png',1.0));
      deliverBlob(blob);
      btn.textContent='✓ 导 出 成 功';
    }
  } catch(e){
    btn.textContent='导 出 失 败';console.error(e);
  }
  setTimeout(()=>{btn.textContent='导 出 高 清 图 片';btn.disabled=false;},2500);
}

D={...TC.rose.defaults};buildGrid();buildFields();render();
